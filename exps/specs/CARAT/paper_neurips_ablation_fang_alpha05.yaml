name: paper_neurips_ablation_fang_alpha05
description: Focused CARAT mechanism ablation for NeurIPS appendix on CIFAR100 alpha=0.5 FangAttack.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_default.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_config.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_rank0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_prior0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_pool400.yaml

matrix:
  distributions:
    - type: non-iid
      dirichlet_alpha: 0.5
  num_advs:
    - 0.2
  models:
    - resnet18
  epochs:
    - 200
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - FangAttack
  defenses:
    - CARAT

repeats:
  count: 3
  start: 0

runtime:
  gpu_idx: 0
  num_workers: 4
  require_cuda: true

slurm:
  account: def-lincai
  time: 1-00:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: FAIL
  chunk_size: 15
  array_parallel: 3
