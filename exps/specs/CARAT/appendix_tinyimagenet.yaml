name: appendix_tinyimagenet
description: Supplementary TinyImageNet untargeted benchmark for the CARAT appendix.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: TinyImageNet
    config: configs/CARAT/FedAvg_TinyImageNet_Resnet18_protocol.yaml

matrix:
  distributions:
    - type: iid
    - type: non-iid
      dirichlet_alpha: 0.5
  num_advs:
    - 0.2
  models:
    - resnet18
  epochs:
    - 300
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - ALIE
    - MinSum
  defenses:
    - Mean
    - FLTrust
    - CARAT

repeats:
  count: 3
  start: 0

runtime:
  gpu_idx: 0
  num_workers: 4
  require_cuda: true

slurm:
  account: def-lincai
  time: 1-12:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: FAIL
  chunk_size: 36
  array_parallel: 2
