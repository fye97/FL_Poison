name: smoke_cifar100
description: Quick CARAT smoke test on CIFAR100 with evaluation enabled.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR100

matrix:
  distributions:
    - type: iid
  num_advs:
    - 0.2
  models:
    - resnet18
  epochs:
    - 5
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - FangAttack
  defenses:
    - Mean
    - CARAT

repeats:
  count: 1
  start: 0

runtime:
  gpu_idx: 0
  require_cuda: true

slurm:
  account: def-lincai
  time: 0-04:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: ALL
  chunk_size: 1
  array_parallel: 1
