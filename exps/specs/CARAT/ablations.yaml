name: ablations
description: One-factor-at-a-time CARAT ablations on the hardest untargeted CIFAR100 setting.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_default.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_tasks1.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_tasks4.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_tasks16.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_beta1.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_beta4.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_beta24.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_rank0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_rank0p4.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_prior0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_prior0p1.yaml

matrix:
  distributions:
    - type: non-iid
      dirichlet_alpha: 0.1
  num_advs:
    - 0.2
  models:
    - resnet18
  epochs:
    - 300
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - FangAttack
  defenses:
    - CARAT

repeats:
  count: 3
  start: 0

runtime:
  gpu_idx: 0
  require_cuda: true

slurm:
  account: def-lincai
  time: 0-18:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: ALL
  chunk_size: 16
  array_parallel: 2
