name: ablations
description: CARAT mechanism ablations on the hardest primary CIFAR100 untargeted setting.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_default.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_tasks4.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_tasks16.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_pool400.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_pool1200.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_rank0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_rank0p4.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_prior0.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_prior0p1.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_clipk1p5.yaml
  - algorithm: FedAvg
    dataset: CIFAR100
    config: configs/CARAT/FedAvg_CIFAR100_Resnet18_carat_clipk3p5.yaml

matrix:
  distributions:
    - type: non-iid
      dirichlet_alpha: 0.1
  num_advs:
    - 0.2
  models:
    - resnet18
  epochs:
    - 300
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - MinSum
  defenses:
    - CARAT

repeats:
  count: 3
  start: 0

runtime:
  gpu_idx: 0
  num_workers: 4
  require_cuda: true

slurm:
  account: def-lincai
  time: 0-12:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: FAIL
  chunk_size: 33
  array_parallel: 3
