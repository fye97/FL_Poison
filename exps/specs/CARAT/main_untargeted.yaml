name: main_untargeted
description: Main untargeted poisoning benchmark for the CARAT paper on CIFAR100.

evaluate: true

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR100

matrix:
  distributions:
    - type: iid
    - type: non-iid
      dirichlet_alpha: 0.1
    - type: non-iid
      dirichlet_alpha: 0.5
  num_advs:
    - 0.2
    - 0.4
  models:
    - resnet18
  epochs:
    - 300
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - ALIE
    - MinMax
    - FangAttack
  defenses:
    - Mean
    - FLTrust
    - MultiKrum
    - CARAT

repeats:
  count: 3
  start: 0

runtime:
  gpu_idx: 0
  require_cuda: true

slurm:
  account: def-lincai
  time: 1-00:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: ALL
  chunk_size: 24
  array_parallel: 2
