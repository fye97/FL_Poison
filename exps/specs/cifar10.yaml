name: cifar10
description: FedAvg poisoning benchmark on CIFAR10.

scenarios:
  - algorithm: FedAvg
    dataset: CIFAR10
    config: configs/FedAvg_CIFAR10_vgg19.yaml

matrix:
  distributions:
    - type: iid
    - type: non-iid
      dirichlet_alpha: 0.1
    - type: non-iid
      dirichlet_alpha: 0.5
    - type: non-iid
      dirichlet_alpha: 1
  num_advs:
    - 0.2
    - 0.3
    - 0.4
  models:
    - vgg19
  epochs:
    - 200
  num_clients:
    - 20
  learning_rates:
    - 0.05
  seeds:
    - 42
  attacks:
    - NoAttack
    - MinMax
    - MinSum
    - ALIE
    - FangAttack
  defenses:
    - Mean
    - TriGuardFL
    - FLDetector
    - FLTrust
    - MultiKrum
    - NormClipping

repeats:
  count: 5
  start: 0

runtime:
  gpu_idx: 0

slurm:
  account: def-lincai
  time: 0-12:00:00
  gpus: nvidia_h100_80gb_hbm3_2g.20gb:1
  cpus_per_task: 8
  mem: 64G
  requeue: true
  output: logs/slurm/%x_%A_%a.out
  error: logs/slurm/%x_%A_%a.err
  mail_user: fengye@uvic.ca
  mail_type: ALL
  array_parallel: 3
