seed: 42
num_experiments: 1
experiment_id: 0

epochs: 300
algorithm: FedAvg
optimizer: SGD
momentum: 0.9
weight_decay: 5.0e-4

num_clients: 20
batch_size: 64
evaluate: false
learning_rate: 0.05
local_epochs: 4

model: resnet18
dataset: CIFAR100
distribution: iid
im_iid_gamma: 0.01
tail_cls_from: 4
dirichlet_alpha: 0.5
cache_partition: false
gpu_idx: [0]
num_workers: 0
record_time: false
log_stream: true

num_adv: 0.2
attack: MinSum
defense: CARAT

defenses:
  - defense: CARAT
    defense_params:
      num_probe_pool: 800
      num_probe_tasks: 1
      probe_samples_per_class: 4
      probe_task_batch_size: 128
      probe_radius_quantile: 0.5
      clip_method: mad
      clip_k: 2.5
      clip_percentile: 0.9
      rho_hat: 0.2
      certificate_beta: 12.0
      rank_weight: 0.20
      prior_weight: 0.05
      rank_num_coords: 4096
      rank_num_subsamples: 5
      optimizer_steps: 60
      optimizer_lr: 0.5
